<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAINIUM - Architecture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0c0b09; /* Material 3 Dark Palette baseline */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #e6e1e5;
        }

        .container {
            /* Material 3 Expressive Container Configuration */
            background: rgba(28, 27, 31, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(230, 186, 68, 0.25); /* Primary Gold outline color role */
            border-radius: 36px; /* Expressive extra-large shape scale */
            padding: 60px 40px;
            max-width: 1460px;
            width: 100%;
            box-shadow: 0 28px 56px rgba(0, 0, 0, 0.6), 
                        0 0 80px rgba(230, 186, 68, 0.03);
        }

        header {
            text-align: center;
            margin-bottom: 48px;
        }

        h1 {
            /* M3 Display Large scale with expressive typography characteristics */
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            font-feature-settings: "ss01" on, "ss02" on;
            background: linear-gradient(135deg, #f6e0a4 0%, #e6ba44 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .architecture-wrapper {
            background: rgba(15, 14, 18, 0.5);
            border: 1px solid rgba(230, 186, 68, 0.1);
            border-radius: 28px; /* High rounding standard for systemic consistency */
            padding: 32px;
            overflow-x: auto;
        }

        svg {
            width: 100%;
            display: block;
            height: auto;
        }

        /* Material 3 Typographic Subscale Mapping */
        .layer-title {
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.18em;
            fill: #e6ba44; /* M3 Primary Accent */
            opacity: 0.85;
        }

        .component-title {
            font-size: 13.5px;
            font-weight: 600;
            fill: #ffffff;
            letter-spacing: -0.01em;
        }

        .component-sub {
            font-size: 11px;
            font-weight: 500;
            fill: #f6e0a4; /* M3 On-Container Tonal Variant */
        }

        .component-detail {
            font-size: 10px;
            fill: #cac4d0; /* M3 Variant Text */
            font-weight: 400;
        }

        .flow-text {
            font-size: 9.5px;
            font-weight: 600;
            fill: #e6ba44;
            letter-spacing: 0.04em;
        }

        /* Elastic/Fluid Motion States matching Material 3 specification */
        .card-node {
            transition: transform 400ms cubic-bezier(0.2, 0, 0, 1), 
                        filter 400ms cubic-bezier(0.2, 0, 0, 1);
            cursor: pointer;
        }

        .card-node:hover {
            transform: scale(1.025) translateY(-2px);
            filter: drop-shadow(0 16px 24px rgba(230, 186, 68, 0.18));
        }

        @keyframes m3-fluid-dash {
            to {
                stroke-dashoffset: -32;
            }
        }

        .data-flow {
            stroke: #e6ba44;
            stroke-width: 2;
            stroke-dasharray: 8, 5;
            animation: m3-fluid-dash 1s linear infinite;
            filter: drop-shadow(0 0 6px rgba(230, 186, 68, 0.35));
        }
    </style>
</head>
